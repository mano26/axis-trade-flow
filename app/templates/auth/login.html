{% extends "layouts/base.html" %}
{% block title %}Login — AXIS Trade Flow{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1 class="auth-title">AXIS TRADE FLOW</h1>
        <p class="auth-subtitle">SOFR Options Trade Management</p>

        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus
                       placeholder="trader@firm.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
