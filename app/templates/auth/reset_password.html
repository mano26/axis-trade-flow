{% extends "layouts/base.html" %}
{% block title %}Reset Password — AXIS Trade Flow{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Reset Password for {{ user.display_name }}</h1>
</div>

<section>
    <form method="POST" action="{{ url_for('admin.reset_password', user_id=user.id) }}" style="max-width: 400px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group" style="margin-bottom: 16px;">
            <label for="new_password" style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">New Password</label>
            <input type="password" id="new_password" name="new_password" required minlength="6"
                   style="width:100%; padding:8px 12px; border:1px solid #d0d0d0; border-radius:4px; font-size:14px;">
        </div>
        <div class="form-group" style="margin-bottom: 16px;">
            <label for="confirm_password" style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                   style="width:100%; padding:8px 12px; border:1px solid #d0d0d0; border-radius:4px; font-size:14px;">
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Reset Password</button>
            <a href="{{ url_for('admin.user_list') }}" class="btn">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
