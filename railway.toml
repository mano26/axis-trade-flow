# Railway Deployment Configuration

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "FLASK_APP=wsgi.py flask db upgrade; gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info --access-logfile - --error-logfile -"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3